<html>
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); }
  .quiz-container { max-width: 700px; margin: 0 auto; padding: 1.5rem; }
  .header { margin-bottom: 2rem; }
  .title { font-size: 22px; font-weight: 500; margin: 0; color: var(--color-text-primary); }
  .progress { font-size: 13px; color: var(--color-text-secondary); margin-top: 0.5rem; }
  .progress-bar { height: 4px; background: var(--color-background-secondary); border-radius: 2px; margin-top: 0.75rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--color-text-info); transition: width 0.3s; }
  .question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  .question-text { font-size: 16px; font-weight: 500; margin: 0 0 1.5rem 0; color: var(--color-text-primary); }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { position: relative; }
  .option input { position: absolute; opacity: 0; cursor: pointer; }
  .option label { display: flex; align-items: center; padding: 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; transition: background-color 0.2s; color: var(--color-text-primary); }
  .option input:hover + label { background: var(--color-background-secondary); }
  .option input:checked + label { background: var(--color-background-info); border-color: var(--color-border-info); }
  .option-radio { width: 20px; height: 20px; border: 2px solid var(--color-border-secondary); border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .option input:checked + label .option-radio { border-color: var(--color-text-info); background: var(--color-background-info); }
  .option-radio::after { content: ''; display: none; }
  .option input:checked + label .option-radio::after { display: block; width: 6px; height: 6px; background: var(--color-text-info); border-radius: 50%; }
  .feedback { margin-top: 1rem; padding: 1rem; border-radius: var(--border-radius-md); font-size: 14px; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--color-background-success); color: var(--color-text-success); border: 0.5px solid var(--color-border-success); }
  .feedback.incorrect { background: var(--color-background-danger); color: var(--color-text-danger); border: 0.5px solid var(--color-border-danger); }
  .button-group { display: flex; gap: 10px; margin-top: 1.5rem; }
  button { padding: 10px 16px; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--color-text-primary); transition: all 0.2s; }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .results-screen { text-align: center; }
  .results-score { font-size: 48px; font-weight: 500; color: var(--color-text-info); margin: 2rem 0 1rem; }
  .results-text { font-size: 16px; color: var(--color-text-primary); margin-bottom: 2rem; }
  .summary-table { text-align: left; background: var(--color-background-secondary); padding: 1rem; border-radius: var(--border-radius-md); margin-bottom: 1.5rem; font-size: 14px; }
  .summary-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .summary-row:last-child { border-bottom: none; }
  .hidden { display: none; }
</style>

<div class="quiz-container">
  <div class="header">
    <h1 class="title">Mathequiz</h1>
    <div class="progress" id="progress-text">Frage 1 von 10</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 10%;"></div>
    </div>
  </div>

  <div id="quiz-content">
    <div class="question-card">
      <div class="question-text" id="question"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="button-group">
        <button id="check-btn" onclick="checkAnswer()">Antwort überprüfen</button>
        <button id="next-btn" onclick="nextQuestion()" disabled>Nächste Frage</button>
      </div>
    </div>
  </div>

  <div id="results-screen" class="hidden">
    <div class="question-card">
      <div class="results-screen">
        <h2 style="margin: 0; font-size: 22px; color: var(--color-text-primary);">Quiz abgeschlossen!</h2>
        <div class="results-score" id="final-score">9/10</div>
        <div class="results-text" id="results-message">Sehr gut!</div>
        <div class="summary-table">
          <div class="summary-row">
            <span>Erreichte Punkte</span>
            <span id="summary-score" style="font-weight: 500;">9/10</span>
          </div>
          <div class="summary-row">
            <span>Prozentsatz</span>
            <span id="summary-percent" style="font-weight: 500;">90%</span>
          </div>
          <div class="summary-row">
            <span>Kategorie: Ganze Zahlen</span>
            <span id="summary-integers">3/3</span>
          </div>
          <div class="summary-row">
            <span>Kategorie: Rechenregeln</span>
            <span id="summary-rules">3/3</span>
          </div>
          <div class="summary-row">
            <span>Kategorie: Bruchrechnen</span>
            <span id="summary-fractions">3/4</span>
          </div>
        </div>
        <button onclick="restartQuiz()" style="width: 100%; padding: 12px;">Quiz neu starten</button>
      </div>
    </div>
  </div>
</div>

<script>
const quizData = [
  {
    category: "Ganze Zahlen",
    question: "Berechne: (-8) × 5 = ?",
    options: ["-40", "-3", "40", "13"],
    correct: 0,
    explanation: "Negative × Positive = Negative. (-8) × 5 = -40"
  },
  {
    category: "Ganze Zahlen",
    question: "Berechne: (-12) ÷ (-3) = ?",
    options: ["4", "-4", "9", "-9"],
    correct: 0,
    explanation: "Negative ÷ Negative = Positive. (-12) ÷ (-3) = 4"
  },
  {
    category: "Ganze Zahlen",
    question: "Berechne: (-6) × (-7) = ?",
    options: ["42", "-42", "13", "1"],
    correct: 0,
    explanation: "Negative × Negative = Positive. (-6) × (-7) = 42"
  },
  {
    category: "Rechenregeln",
    question: "Berechne: 3 + 4 × 2 = ?",
    options: ["11", "14", "10", "6"],
    correct: 0,
    explanation: "Punkt vor Strich: Erst Multiplikation, dann Addition. 4 × 2 = 8, dann 3 + 8 = 11"
  },
  {
    category: "Rechenregeln",
    question: "Berechne: (5 + 3) × 2 = ?",
    options: ["16", "11", "13", "5"],
    correct: 0,
    explanation: "Klammern zuerst: (5 + 3) = 8, dann 8 × 2 = 16"
  },
  {
    category: "Rechenregeln",
    question: "Berechne: 20 - 4 × 3 + 2 = ?",
    options: ["10", "30", "14", "48"],
    correct: 0,
    explanation: "Punkt vor Strich: 4 × 3 = 12, dann 20 - 12 + 2 = 10"
  },
  {
    category: "Bruchrechnen",
    question: "Kürze: 8/12 = ?",
    options: ["2/3", "4/6", "1/3", "8/12"],
    correct: 0,
    explanation: "GGT(8,12) = 4. (8÷4)/(12÷4) = 2/3"
  },
  {
    category: "Bruchrechnen",
    question: "Berechne: 1/2 × 2/3 = ?",
    options: ["1/3", "2/6", "2/5", "3/5"],
    correct: 0,
    explanation: "Brüche multiplizieren: Zähler × Zähler, Nenner × Nenner. (1×2)/(2×3) = 2/6 = 1/3"
  },
  {
    category: "Bruchrechnen",
    question: "Berechne: 3/4 ÷ 1/2 = ?",
    options: ["3/2", "3/8", "1/2", "2/3"],
    correct: 0,
    explanation: "Durch einen Bruch teilen = mit Kehrwert multiplizieren. 3/4 × 2/1 = 6/4 = 3/2"
  },
  {
    category: "Bruchrechnen",
    question: "Berechne: 2 1/4 + 1 3/4 = ?",
    options: ["4", "3 1/2", "4 1/4", "3 4/4"],
    correct: 0,
    explanation: "Gemischte Brüche: (2 + 1) + (1/4 + 3/4) = 3 + 1 = 4"
  }
];

let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;
let categoryScores = { "Ganze Zahlen": 0, "Rechenregeln": 0, "Bruchrechnen": 0 };
let categoryTotal = { "Ganze Zahlen": 0, "Rechenregeln": 0, "Bruchrechnen": 0 };

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadQuestion() {
  const q = quizData[currentQuestion];
  document.getElementById("question").textContent = q.question;
  
  const shuffledOptions = shuffle(q.options);
  const correctIndex = shuffledOptions.indexOf(q.options[q.correct]);
  quizData[currentQuestion].correctIndex = correctIndex;
  
  const optionsContainer = document.getElementById("options");
  optionsContainer.innerHTML = "";
  shuffledOptions.forEach((opt, idx) => {
    const label = document.createElement("label");
    label.innerHTML = `<span class="option-radio"></span>${opt}`;
    const input = document.createElement("input");
    input.type = "radio";
    input.name = "answer";
    input.value = idx;
    input.onchange = () => { selectedAnswer = idx; };
    const wrapper = document.createElement("div");
    wrapper.className = "option";
    wrapper.appendChild(input);
    wrapper.appendChild(label);
    optionsContainer.appendChild(wrapper);
  });
  
  selectedAnswer = null;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("check-btn").disabled = false;
  document.getElementById("next-btn").disabled = true;
  document.getElementById("progress-text").textContent = `Frage ${currentQuestion + 1} von ${quizData.length}`;
  document.getElementById("progress-fill").style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;
}

function checkAnswer() {
  if (selectedAnswer === null) return;
  const q = quizData[currentQuestion];
  const feedback = document.getElementById("feedback");
  const isCorrect = selectedAnswer === q.correctIndex;
  
  const cat = q.category;
  categoryTotal[cat]++;
  if (isCorrect) {
    score++;
    categoryScores[cat]++;
    feedback.className = "feedback correct show";
    feedback.textContent = "✓ Richtig! " + q.explanation;
  } else {
    feedback.className = "feedback incorrect show";
    feedback.textContent = "✗ Leider falsch. " + q.explanation;
  }
  
  document.getElementById("check-btn").disabled = true;
  document.getElementById("next-btn").disabled = false;
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < quizData.length) {
    loadQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById("quiz-content").classList.add("hidden");
  document.getElementById("results-screen").classList.remove("hidden");
  const percent = Math.round((score / quizData.length) * 100);
  document.getElementById("final-score").textContent = `${score}/${quizData.length}`;
  document.getElementById("summary-score").textContent = `${score}/${quizData.length}`;
  document.getElementById("summary-percent").textContent = `${percent}%`;
  document.getElementById("summary-integers").textContent = `${categoryScores["Ganze Zahlen"]}/${categoryTotal["Ganze Zahlen"]}`;
  document.getElementById("summary-rules").textContent = `${categoryScores["Rechenregeln"]}/${categoryTotal["Rechenregeln"]}`;
  document.getElementById("summary-fractions").textContent = `${categoryScores["Bruchrechnen"]}/${categoryTotal["Bruchrechnen"]}`;
  
  let message = "";
  if (percent === 100) message = "Perfekt! 🎯";
  else if (percent >= 80) message = "Sehr gut!";
  else if (percent >= 60) message = "Gut gemacht!";
  else if (percent >= 40) message = "Noch etwas üben...";
  else message = "Viel Erfolg beim Lernen!";
  document.getElementById("results-message").textContent = message;
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;
  selectedAnswer = null;
  categoryScores = { "Ganze Zahlen": 0, "Rechenregeln": 0, "Bruchrechnen": 0 };
  categoryTotal = { "Ganze Zahlen": 0, "Rechenregeln": 0, "Bruchrechnen": 0 };
  document.getElementById("quiz-content").classList.remove("hidden");
  document.getElementById("results-screen").classList.add("hidden");
  loadQuestion();
}

loadQuestion();
</script>
</html>
